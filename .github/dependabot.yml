version: 2
updates:
  # 1. GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Asia/Kolkata" # Indian Standard Time (IST)
    open-pull-requests-limit: 10
    reviewers:
      - "CodeWithSushil"
    assignees:
      - "CodeWithSushil"
    # Bundles updates to stay within your 10 PR limit efficiently
    groups:
      action-updates:
        patterns:
          - "*"

  # 2. Composer (PHP) updates
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "daily"
      time: "10:00"
      timezone: "Asia/Kolkata" # Indian Standard Time (IST)
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "php"
    reviewers:
      - "CodeWithSushil"
    assignees:
      - "CodeWithSushil"
    # Formats commits for cleaner history
    commit-message:
      prefix: "chore"
      include: "scope"

